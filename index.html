<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #161b27;
      --surface2: #1c2233;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --muted: #6b7290;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.2);
      --green: #4ade80;
      --green-glow: rgba(74,222,128,0.15);
      --amber: #fbbf24;
      --amber-glow: rgba(251,191,36,0.15);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.15);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 64px;
    }

    .brand-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 32px;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand span { color: var(--accent); }

    /* ── Progress ── */
    .progress-bar-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 40px;
    }

    .progress-track {
      position: relative;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 12px;
    }

    #progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
    }

    .progress-step {
      font-size: 12px;
      color: var(--muted);
      transition: color 0.3s;
    }

    .progress-step.active { color: var(--accent); font-weight: 600; }
    .progress-step.completed { color: var(--green); }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
    }

    @media (max-width: 600px) {
      .card { padding: 28px 24px; }
    }

    /* ── Step content ── */
    .step-header { margin-bottom: 28px; }
    .step-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .step-header h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .step-desc { color: var(--muted); font-size: 14px; }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

    .field-hint { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .field-hint.muted { margin-top: 6px; font-size: 12px; }

    /* ── Inputs ── */
    .input-prefix {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-prefix:focus-within { border-color: var(--accent); }
    .input-prefix span { padding: 0 14px; color: var(--muted); font-size: 15px; background: rgba(255,255,255,0.03); border-right: 1px solid var(--border); height: 48px; display: flex; align-items: center; }
    .input-prefix input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 0 16px; height: 48px; }

    /* ── Slider ── */
    .slider-row { display: flex; align-items: center; gap: 16px; }
    .slider-row input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 4px; background: var(--surface2); outline: none; cursor: pointer; }
    .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); box-shadow: 0 0 0 3px var(--accent-glow); cursor: pointer; }
    .slider-val { min-width: 52px; text-align: right; font-size: 15px; font-weight: 600; color: var(--text); }

    /* ── Toggle ── */
    .toggle-row { display: flex; align-items: center; gap: 12px; }
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; transition: background 0.2s; }
    .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle-thumb { position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(20px); }

    /* ── Buttons ── */
    .step-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 30px var(--accent-glow); }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 13px 24px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    .btn-ghost {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 0;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); }

    /* ── Results ── */
    #results { display: none; }

    .results-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding: 0 4px;
    }

    /* ── Verdict ── */
    .verdict-banner {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 28px 32px;
      border-radius: var(--radius);
      border: 1px solid;
      margin-bottom: 28px;
    }

    .verdict-green { background: var(--green-glow); border-color: rgba(74,222,128,0.3); }
    .verdict-amber { background: var(--amber-glow); border-color: rgba(251,191,36,0.3); }
    .verdict-red { background: var(--red-glow); border-color: rgba(248,113,113,0.3); }

    .verdict-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .verdict-green .verdict-icon { color: var(--green); }
    .verdict-amber .verdict-icon { color: var(--amber); }
    .verdict-red .verdict-icon { color: var(--red); }

    .verdict-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .verdict-green .verdict-title { color: var(--green); }
    .verdict-amber .verdict-title { color: var(--amber); }
    .verdict-red .verdict-title { color: var(--red); }

    .verdict-sub { color: var(--muted); font-size: 14px; }

    /* ── Metrics ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
    }

    .metric-card.metric-green { border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.04); }
    .metric-card.metric-red { border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.04); }

    .metric-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .metric-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .metric-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .text-red { color: var(--red); }

    /* ── Charts ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 700px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 16px; }

    /* ── Assumptions ── */
    .assumptions-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .assumptions-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

    .assumptions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px 24px;
      margin-bottom: 16px;
    }

    .assumptions-grid div { display: flex; justify-content: space-between; font-size: 13px; }
    .a-label { color: var(--muted); }

    .spending-curve-note { font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 14px; line-height: 1.7; }

    /* ── Brand tagline ── */
    .brand-tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 3px; }

    /* ── Hero ── */
    .hero-section {
      text-align: center;
      padding: 48px 24px 36px;
      margin-bottom: 20px;
    }

    .archetype-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--accent);
      border: 1px solid rgba(124,106,255,0.3);
      background: var(--accent-glow);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .hero-retire-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 4px;
    }

    .hero-age {
      font-family: 'Syne', sans-serif;
      font-size: 100px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      letter-spacing: -5px;
      margin-bottom: 20px;
    }

    .hero-age-unit {
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 0;
      margin-left: 6px;
      font-weight: 600;
    }

    .hero-age-now { font-size: 64px; letter-spacing: -2px; color: var(--green); }
    .hero-age-none { font-size: 48px; letter-spacing: -1px; color: var(--red); }

    .archetype-desc {
      font-size: 16px;
      color: var(--muted);
      font-style: italic;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .hero-age { font-size: 72px; letter-spacing: -3px; }
      .hero-age-unit { font-size: 22px; }
      .hero-age-now { font-size: 48px; }
    }

    /* ── Share card ── */
    .share-card {
      background: var(--surface2);
      border: 1px solid rgba(124,106,255,0.25);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .share-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), rgba(124,106,255,0));
    }

    .share-card-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .share-stats-row {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }

    .share-stat { flex: 1; text-align: center; }
    .share-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .share-stat-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); }

    .share-stat-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

    .share-progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .share-progress-track { flex: 1; height: 5px; background: var(--surface); border-radius: 3px; overflow: hidden; }
    .share-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 3px; transition: width 0.5s ease; }
    .share-progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #000;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .share-btn:hover { background: #1a1a1a; border-color: rgba(255,255,255,0.25); }

    /* ── Footer ── */
    .app-footer {
      margin-top: 56px;
      padding-bottom: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .app-footer a { color: var(--accent); text-decoration: none; }
    .app-footer a:hover { text-decoration: underline; }

    /* ── Suggestions ── */
    .suggestions-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
    }

    .lever-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .lever-row:last-child { border-bottom: none; padding-bottom: 0; }
    .lever-row:first-of-type { padding-top: 0; }

    .lever-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--muted);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .lever-dot-active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .lever-easiest .lever-label { color: var(--text); font-weight: 600; }

    .lever-label {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lever-detail { font-size: 12px; color: var(--muted); margin-top: 3px; opacity: 0.7; }

    .lever-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(124,106,255,0.3);
      padding: 2px 7px;
      border-radius: 20px;
    }

    .assumptions-sliders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0 32px;
      margin-bottom: 16px;
    }

    .assumptions-sliders .form-group { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Brand -->
    <div class="brand-bar">
      <div>
        <div class="brand">Retirement <span>Calculator</span></div>
        <div class="brand-tagline">No fluff. Just math.</div>
      </div>
    </div>

    <!-- Questionnaire -->
    <div id="questionnaire" style="width:100%;max-width:560px">
      <!-- Progress -->
      <div class="progress-bar-wrap">
        <div class="progress-track">
          <div id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-steps">
          <span class="progress-step" data-step="1">You today</span>
          <span class="progress-step" data-step="2">Spending</span>
          <span class="progress-step" data-step="3">Income</span>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <div id="step-content"></div>
      </div>
    </div>

    <!-- Results -->
    <div id="results" style="width:100%;padding:0 8px"></div>

    <div class="app-footer">
      Vibecoded by <a href="https://twitter.com/0xWenMoon" target="_blank">@0xWenMoon</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
